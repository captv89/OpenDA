services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openda
      POSTGRES_PASSWORD: openda
      POSTGRES_DB: openda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openda -d openda"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Extractor ──────────────────────────────────────────────────────────────
  # Heavy image: docling + torch + litellm (~8 GB).
  # Built once, shared by zero other services. Never exposed externally.

  extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s  # docling model-loading takes time on first start

  # ── Backend ────────────────────────────────────────────────────────────────
  # Slim image (~400 MB): FastAPI + SQLAlchemy + Celery client only.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://openda:openda@postgres:5432/openda
      REDIS_URL: redis://redis:6379/0
      EXTRACTOR_URL: http://extractor:8001
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://openda:openda@postgres:5432/openda
      REDIS_URL: redis://redis:6379/0
      EXTRACTOR_URL: http://extractor:8001
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      extractor:
        condition: service_healthy

  # ── Frontends ──────────────────────────────────────────────────────────────

  frontend-accountant:
    build:
      context: .
      dockerfile: frontend-accountant/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  frontend-operator:
    build:
      context: .
      dockerfile: frontend-operator/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
